[tools]
go = "1.26.1"
golangci-lint = "2.11.2"
awscli = "2.34.4"
bun = "1.3.9"

[env]
MISE_DISABLE_BACKENDS = "aqua,ubi"

[settings]
experimental = true
npm.bun = true

# Setup

[tasks.setup]
run = "bun install"

# Commands

[tasks.components]
run = "go run cmd/components/main.go"

[tasks.contributions]
run = "go run cmd/contributions/main.go"

[tasks.keygen]
run = "mise sre keygen --config cmd/sre/.sre"

[tasks.pgaccess]
run = "mise sre postgres access --config cmd/sre/.sre"

[tasks.release]
run = "mise sre release --config cmd/sre/.sre"

[tasks.sre]
run = "go run cmd/sre/main.go"

[tasks.workplan]
run = "go run cmd/workplan/main.go"

# Testing

[tasks.test]
run = "go test ./... -v"

# Linting

[tasks.lint]
depends = ["lint-*"]

[tasks.lint-go]
run = "golangci-lint run --fix"

[tasks.lint-prettier]
depends = ["setup", "format-prettier-sync"]
run = "bun run lint"

[tasks.format]
depends = ["format-*"]

[tasks.format-prettier-sync]
run = "sh ./scripts/sync-prettier-config.sh"

[tasks.format-prettier]
depends = ["setup", "format-prettier-sync"]
run = "bun run format"

[tasks.format-go]
run = "go fmt ./..."
