[tools]
go = "1.25.6"
node = "25.7.0"
prettier = "3.8.1"
golangci-lint = "2.8.0"
awscli = "latest"

[env]
MISE_DISABLE_BACKENDS = "aqua,ubi"

[settings]
experimental = true

# Commands

[tasks.aiprompt]
run = "go run cmd/aiprompt/main.go cmd/aiprompt/.prompts"

[tasks.contributions]
run = "go run cmd/contributions/main.go"

[tasks.keygen]
run = "go run cmd/keygen/main.go"

[tasks.workplan]
run = "go run cmd/workplan/main.go"

# Testing

[tasks.test]
run = "go test ./... -v"

# Linting

[tasks.lint]
depends = [
	"lint-go",
	"lint-prettier",
]

[tasks.lint-go]
run = "golangci-lint run --fix"

[tasks.lint-prettier]
depends = ["format-prettier-sync"]
run = "prettier --config ./prettier.config.json --ignore-path ./.prettierignore --check \"**/*.{md,yml,yaml}\""

[tasks.format]
depends = [
	"format-prettier",
	"format-go",
]

[tasks.format-prettier-sync]
run = "sh ./scripts/sync-prettier-config.sh"

[tasks.format-prettier]
depends = ["format-prettier-sync"]
run = "prettier --config ./prettier.config.json --ignore-path ./.prettierignore --write \"**/*.{md,yml,yaml}\""

[tasks.format-go]
run = "go fmt ./..."

# Release

[tasks.release]
run = "go run cmd/release/main.go"
