# .goreleaser.yaml
project_name: devex

builds:
  - id: contributions
    main: ./cmd/contributions
    binary: devex-contributions
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

  - id: sre
    main: ./cmd/sre
    binary: devex-sre
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

  - id: workplan
    main: ./cmd/workplan
    binary: devex-workplan
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

archives:
  - name_template: "devex_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    # Explicitly include all build IDs
    builds:
      - contributions
      - sre
      - workplan
    # This is the "magic" bit:
    # Ensure GoReleaser doesn't strip the binary names
    files:
      - src: 'LICENSE*'
      - src: 'README*'
